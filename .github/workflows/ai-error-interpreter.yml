name: "AI Error Interpreter"

on:
  workflow_run:
    workflows: ["*"] # Listen to all workflows
    types:
      - completed

jobs:
  analyze-error:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Download failed run logs"
        uses: actions/github-script@v7
        with:
          script: |
            const run_id = context.payload.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            console.log(`Downloading logs for run ${run_id}...`);
            const download = await github.rest.actions.downloadWorkflowRunLogs({
              owner,
              repo,
              run_id,
            });
            
            const fs = require('fs');
            fs.writeFileSync('logs.zip', Buffer.from(download.data));

      - name: "Extract logs"
        run: |
          mkdir -p raw-logs
          unzip logs.zip -d raw-logs

      - name: "Intelligent log processing"
        run: |
          node scripts/extract-error-logs.js raw-logs

      - name: "Analyze error with AI"
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_DEPLOYMENT_NAME: ${{ secrets.AZURE_DEPLOYMENT_NAME }}
        run: |
          node scripts/analyze-ci-error.js

      - name: "Post analysis to PR"
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const analysis = fs.readFileSync('ai-analysis.md', 'utf-8');
            const prs = context.payload.workflow_run.pull_requests;
            
            if (prs.length === 0) {
              console.log("No pull requests found for this run. Skipping comment.");
              return;
            }
            
            const pr_number = prs[0].number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Search for existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: pr_number,
            });
            
            const existingComment = comments.find(c => c.body.includes('<!-- STRIDE-ERROR-ANALYZER -->'));
            
            if (existingComment) {
              console.log(`Updating existing comment ${existingComment.id}...`);
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: analysis
              });
            } else {
              console.log(`Creating new comment on PR #${pr_number}...`);
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr_number,
                body: analysis
              });
            }
