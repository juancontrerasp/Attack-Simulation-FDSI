name: Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'attack-engine/**'
      - 'stride-agent/**'
      - '.github/workflows/docker-publish.yml'

jobs:
  publish:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push attack-engine
        uses: docker/build-push-action@v5
        with:
          context: ./attack-engine
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/attack-engine:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/attack-engine:${{ github.sha }}

      - name: Build & push stride-agent
        uses: docker/build-push-action@v5
        with:
          context: ./stride-agent
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/stride-agent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/stride-agent:${{ github.sha }}
