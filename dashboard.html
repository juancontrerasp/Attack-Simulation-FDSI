<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unified Security Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --line: #334155;
      --ok: #22c55e;
      --warn: #eab308;
      --danger: #ef4444;
      --blue: #3b82f6;
      --blue-soft: #93c5fd;
      --gray: #64748b;
    }

    body {
      margin: 0;
      background: radial-gradient(circle at top right, #1e293b 0%, #0f172a 55%);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-width: 1024px;
    }

    .wrap {
      max-width: 1460px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.92);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      position: sticky;
      top: 8px;
      z-index: 20;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 12px;
      background: #0b1220;
      font-size: 0.82rem;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .dot.pass { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
    .dot.fail { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
    .dot.unknown { background: var(--gray); }

    .panel {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(17, 24, 39, 0.92);
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--blue-soft);
      letter-spacing: 0.8px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      gap: 16px;
    }

    .group-title {
      font-size: 0.74rem;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chips label {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      background: #0b1220;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .stride-cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(220px, 1fr));
      gap: 12px;
    }

    .stride-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      padding: 12px;
      cursor: pointer;
      transition: transform 0.12s ease, border-color 0.12s ease;
    }

    .stride-card:hover {
      transform: translateY(-1px);
      border-color: var(--blue);
    }

    .stride-card.high { border-color: var(--danger); }
    .stride-card.mid { border-color: var(--warn); }
    .stride-card.low { border-color: var(--ok); }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .cat {
      font-weight: 700;
      font-size: 0.86rem;
    }

    .count {
      font-size: 1.3rem;
      font-weight: 800;
    }

    .sev-badges {
      margin-top: 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 3px 8px;
      font-size: 0.74rem;
      color: #dbeafe;
      background: #0b1220;
    }

    .b-high { border-color: var(--danger); color: #fecaca; }
    .b-mid { border-color: var(--warn); color: #fde68a; }
    .b-low { border-color: var(--ok); color: #bbf7d0; }

    .threat-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
      display: none;
      font-size: 0.78rem;
      color: #cbd5e1;
    }

    .threat-list.open { display: block; }

    .threat-item + .threat-item {
      margin-top: 8px;
    }

    .threat-item .head {
      font-weight: 600;
    }

    .radar-box {
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dynamic-table-wrap {
      overflow-x: auto;
      margin-top: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      font-size: 0.82rem;
    }

    th, td {
      border-bottom: 1px solid #253041;
      padding: 10px 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    .status-vuln { color: #fecaca; }
    .status-safe { color: #bbf7d0; }
    .status-na { color: #cbd5e1; }

    .confirm-yes { color: #86efac; font-weight: 700; }
    .confirm-no { color: #fca5a5; font-weight: 700; }
    .confirm-na { color: #94a3b8; font-weight: 700; }

    .details {
      display: block;
      margin-top: 4px;
      color: #cbd5e1;
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .ci-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(260px, 1fr));
      gap: 12px;
    }

    .ci-card {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-2);
      padding: 12px;
    }

    .ci-k {
      color: var(--muted);
      font-size: 0.76rem;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .ci-v {
      font-size: 1.1rem;
      font-weight: 800;
    }

    a.link {
      color: #93c5fd;
      text-decoration: none;
      font-size: 0.84rem;
    }

    a.link:hover { text-decoration: underline; }

    .empty {
      color: var(--muted);
      font-size: 0.84rem;
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: #0b1220;
    }

    .loading {
      margin-top: 16px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <div class="title">Unified Security Dashboard: Static + Dynamic + CI/CD</div>
        <div class="subtitle" id="reportTime">Loading report...</div>
      </div>
      <div class="status-chip">
        <span id="ciDot" class="dot unknown"></span>
        <span id="ciStatusText">Pipeline status pending</span>
      </div>
    </header>

    <section class="panel">
      <h2>Global Filters</h2>
      <div class="filters-grid">
        <div>
          <div class="group-title">STRIDE Category</div>
          <div class="chips" id="categoryFilters"></div>
        </div>
        <div>
          <div class="group-title">Severity</div>
          <div class="chips" id="severityFilters"></div>
        </div>
        <div>
          <div class="group-title">Confirmation</div>
          <div class="chips" id="confirmationFilters"></div>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>STRIDE Panel</h2>
      <div class="layout">
        <div>
          <div class="stride-cards" id="strideCards"></div>
        </div>
        <div class="radar-box">
          <canvas id="strideRadar" width="380" height="380"></canvas>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Dynamic Validation Panel</h2>
      <div class="dynamic-table-wrap">
        <table>
          <thead>
            <tr>
              <th>Attack</th>
              <th>STRIDE Category</th>
              <th>Status</th>
              <th>Confirmed</th>
              <th>Detail</th>
            </tr>
          </thead>
          <tbody id="dynamicTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="panel">
      <h2>CI/CD Panel</h2>
      <div class="ci-grid" id="ciPanel"></div>
    </section>

    <div id="loading" class="loading">Loading combined-report.json...</div>
  </div>

  <script>
    window.__EMBEDDED_BASELINE__ = window.__EMBEDDED_BASELINE__ || null;
    window.__EMBEDDED_PIPELINE__ = window.__EMBEDDED_PIPELINE__ || null;
    window.__EMBEDDED_REPORT__   = window.__EMBEDDED_REPORT__   || null;

    const STRIDE_CATEGORIES = [
      'Spoofing', 'Tampering', 'Repudiation', 'InformationDisclosure', 'DenialOfService', 'ElevationOfPrivilege'
    ];

    const ATTACK_CATALOG = [
      { attack_name: 'SQL Injection', attack_class: 'SqlInjectionAttack', category: 'Tampering' },
      { attack_name: 'Brute Force', attack_class: 'BruteForceAttack', category: 'DenialOfService' },
      { attack_name: 'Session Fixation', attack_class: 'SessionFixationAttack', category: 'Spoofing' },
      { attack_name: 'JWT Token Security', attack_class: 'JwtTokenAttack', category: 'Spoofing' },
      { attack_name: 'Cross-Site Scripting', attack_class: 'XssAttack', category: 'Tampering' },
      { attack_name: 'Path Traversal', attack_class: 'PathTraversalAttack', category: 'InformationDisclosure' },
      { attack_name: 'Information Leakage', attack_class: 'InfoLeakAttack', category: 'InformationDisclosure' },
      { attack_name: 'Insecure HTTP Headers', attack_class: 'InsecureHeadersAttack', category: 'InformationDisclosure' },
      { attack_name: 'CORS Misconfiguration', attack_class: 'CorsAttack', category: 'Spoofing' },
      { attack_name: 'Weak Password Policy', attack_class: 'WeakPasswordAttack', category: 'ElevationOfPrivilege' }
    ];

    const REPO_OWNER = 'juancontrerasp';
    const REPO_NAME = 'Attack-Simulation-FDSI';
    const ACTIONS_URL = `https://github.com/${REPO_OWNER}/${REPO_NAME}/actions`;
    const ACTIONS_API = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/runs?per_page=1`;

    const FILTER_KEY = 'unified-dashboard-filters-v1';

    const state = {
      raw: null,
      threats: [],
      baseline: [],
      pipeline: null,
      filters: {
        categories: new Set(STRIDE_CATEGORIES),
        severities: new Set(['Alta', 'Media', 'Baja']),
        confirmation: 'all'
      },
      expandedCategories: new Set()
    };

    let radarChart = null;

    const CATEGORY_ALIASES = {
      'informationdisclosure': 'InformationDisclosure',
      'information disclosure': 'InformationDisclosure',
      'denialofservice': 'DenialOfService',
      'denial of service': 'DenialOfService',
      'elevationofprivilege': 'ElevationOfPrivilege',
      'elevation of privilege': 'ElevationOfPrivilege',
      spoofing: 'Spoofing',
      tampering: 'Tampering',
      repudiation: 'Repudiation'
    };

    function normCategory(cat) {
      const raw = String(cat || '').trim();
      const compact = raw.toLowerCase().replace(/\s+/g, '');
      return CATEGORY_ALIASES[compact] || CATEGORY_ALIASES[raw.toLowerCase()] || raw || 'UnknownCategory';
    }

    function baselineKey(obj) {
      return `${normCategory(obj.category).toLowerCase()}|${String(obj.component || '').trim().toLowerCase()}`;
    }

    function normalizeThreat(t) {
      return {
        category: normCategory(t.category),
        component: String(t.component || '').trim() || 'UnknownComponent',
        severity: (t.severity === 'Alta' || t.severity === 'Media' || t.severity === 'Baja') ? t.severity : 'Media',
        description: String(t.description || ''),
        mitigation: String(t.mitigation || ''),
        confirmed: t.confirmed === true ? true : (t.confirmed === false ? false : null),
        dynamic_validation: t.dynamic_validation || null
      };
    }

    function loadSavedFilters() {
      try {
        const saved = localStorage.getItem(FILTER_KEY);
        if (!saved) return;
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed.categories) && parsed.categories.length) {
          state.filters.categories = new Set(parsed.categories);
        }
        if (Array.isArray(parsed.severities) && parsed.severities.length) {
          state.filters.severities = new Set(parsed.severities);
        }
        if (parsed.confirmation === 'all' || parsed.confirmation === 'confirmed' || parsed.confirmation === 'not-confirmed') {
          state.filters.confirmation = parsed.confirmation;
        }
      } catch (_) {
      }
    }

    function saveFilters() {
      const serializable = {
        categories: [...state.filters.categories],
        severities: [...state.filters.severities],
        confirmation: state.filters.confirmation
      };
      localStorage.setItem(FILTER_KEY, JSON.stringify(serializable));
    }

    function setupFilters() {
      const categoryRoot = document.getElementById('categoryFilters');
      categoryRoot.innerHTML = STRIDE_CATEGORIES.map((cat) => {
        const checked = state.filters.categories.has(cat) ? 'checked' : '';
        return `<label><input type="checkbox" data-type="category" value="${cat}" ${checked}> ${cat}</label>`;
      }).join('');

      const severityRoot = document.getElementById('severityFilters');
      const severities = ['Alta', 'Media', 'Baja'];
      severityRoot.innerHTML = severities.map((sev) => {
        const checked = state.filters.severities.has(sev) ? 'checked' : '';
        return `<label><input type="checkbox" data-type="severity" value="${sev}" ${checked}> ${sev}</label>`;
      }).join('');

      const confirmationRoot = document.getElementById('confirmationFilters');
      const options = [
        { label: 'All', value: 'all' },
        { label: 'Confirmed', value: 'confirmed' },
        { label: 'Not Confirmed', value: 'not-confirmed' }
      ];
      confirmationRoot.innerHTML = options.map((opt) => {
        const checked = state.filters.confirmation === opt.value ? 'checked' : '';
        return `<label><input type="radio" name="confirmation" data-type="confirmation" value="${opt.value}" ${checked}> ${opt.label}</label>`;
      }).join('');

      document.querySelectorAll('input[data-type="category"]').forEach((input) => {
        input.addEventListener('change', () => {
          const value = input.value;
          if (input.checked) state.filters.categories.add(value);
          else state.filters.categories.delete(value);
          if (state.filters.categories.size === 0) state.filters.categories.add(value);
          saveFilters();
          renderAll();
        });
      });

      document.querySelectorAll('input[data-type="severity"]').forEach((input) => {
        input.addEventListener('change', () => {
          const value = input.value;
          if (input.checked) state.filters.severities.add(value);
          else state.filters.severities.delete(value);
          if (state.filters.severities.size === 0) state.filters.severities.add(value);
          saveFilters();
          renderAll();
        });
      });

      document.querySelectorAll('input[data-type="confirmation"]').forEach((input) => {
        input.addEventListener('change', () => {
          state.filters.confirmation = input.value;
          saveFilters();
          renderAll();
        });
      });
    }

    function applyGlobalFilters(threats) {
      const f = state.filters;
      return threats.filter((t) => {
        if (!f.categories.has(t.category)) return false;
        if (!f.severities.has(t.severity)) return false;
        if (f.confirmation === 'confirmed' && t.confirmed !== true) return false;
        if (f.confirmation === 'not-confirmed' && t.confirmed === true) return false;
        return true;
      });
    }

    function severityCounts(list) {
      return {
        Alta: list.filter((x) => x.severity === 'Alta').length,
        Media: list.filter((x) => x.severity === 'Media').length,
        Baja: list.filter((x) => x.severity === 'Baja').length
      };
    }

    function cardClass(counts) {
      if (counts.Alta > 0) return 'high';
      if (counts.Media > 0 || counts.Baja > 0) return 'mid';
      return 'low';
    }

    function renderStrideCards(filtered) {
      const root = document.getElementById('strideCards');
      const byCategory = Object.fromEntries(STRIDE_CATEGORIES.map((cat) => [cat, []]));
      filtered.forEach((t) => {
        if (!byCategory[t.category]) byCategory[t.category] = [];
        byCategory[t.category].push(t);
      });

      root.innerHTML = STRIDE_CATEGORIES.map((cat) => {
        const items = byCategory[cat] || [];
        const counts = severityCounts(items);
        const expanded = state.expandedCategories.has(cat);
        const listHtml = items.length
          ? items.map((item) => {
              return `<div class="threat-item"><div class="head">[${item.severity}] ${item.component}</div><div>${item.description || 'No description.'}</div></div>`;
            }).join('')
          : '<div class="empty">No threats for this category under current filters.</div>';

        return `
          <article class="stride-card ${cardClass(counts)}" data-cat="${cat}">
            <div class="row">
              <div class="cat">${cat}</div>
              <div class="count">${items.length}</div>
            </div>
            <div class="sev-badges">
              <span class="badge b-high">Alta: ${counts.Alta}</span>
              <span class="badge b-mid">Media: ${counts.Media}</span>
              <span class="badge b-low">Baja: ${counts.Baja}</span>
            </div>
            <div class="threat-list ${expanded ? 'open' : ''}">${listHtml}</div>
          </article>
        `;
      }).join('');

      root.querySelectorAll('.stride-card').forEach((card) => {
        card.addEventListener('click', () => {
          const cat = card.getAttribute('data-cat');
          if (state.expandedCategories.has(cat)) state.expandedCategories.delete(cat);
          else state.expandedCategories.add(cat);
          renderStrideCards(filtered);
        });
      });
    }

    function renderRadar(filtered) {
      const detected = STRIDE_CATEGORIES.map((cat) => filtered.filter((t) => t.category === cat).length);
      const confirmed = STRIDE_CATEGORIES.map((cat) => filtered.filter((t) => t.category === cat && t.confirmed === true).length);

      const ctx = document.getElementById('strideRadar').getContext('2d');
      if (radarChart) radarChart.destroy();

      radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: STRIDE_CATEGORIES,
          datasets: [
            {
              label: 'Detectadas (estatico)',
              data: detected,
              borderColor: '#3b82f6',
              backgroundColor: 'rgba(59,130,246,0.18)',
              pointBackgroundColor: '#3b82f6',
              borderWidth: 2
            },
            {
              label: 'Confirmadas (dinamico)',
              data: confirmed,
              borderColor: '#ef4444',
              backgroundColor: 'rgba(239,68,68,0.12)',
              pointBackgroundColor: '#ef4444',
              borderWidth: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            r: {
              beginAtZero: true,
              ticks: { stepSize: 1, color: '#94a3b8' },
              grid: { color: '#334155' },
              angleLines: { color: '#334155' },
              pointLabels: { color: '#cbd5e1', font: { size: 11 } }
            }
          },
          plugins: {
            legend: {
              labels: { color: '#e5e7eb' }
            }
          }
        }
      });
    }

    function findThreatForAttack(catalogItem, normalizedThreats) {
      const byClass = normalizedThreats.find((t) => {
        const comp = String(t.component || '').toLowerCase();
        return comp === catalogItem.attack_class.toLowerCase() || comp.includes(catalogItem.attack_name.toLowerCase());
      });
      if (byClass) return byClass;

      return normalizedThreats.find((t) => normCategory(t.category) === catalogItem.category);
    }

    function buildDynamicRows(raw, normalizedThreats) {
      const source = Array.isArray(raw.dynamic_validation) ? raw.dynamic_validation : [];
      const byClass = new Map(source.filter((x) => x && x.attack_class).map((x) => [x.attack_class, x]));

      return ATTACK_CATALOG.map((item) => {
        const dv = byClass.get(item.attack_class) || null;
        const threat = findThreatForAttack(item, normalizedThreats);

        return {
          attack_name: item.attack_name,
          attack_class: item.attack_class,
          category: item.category,
          vulnerable: dv ? !!dv.vulnerable : null,
          confirmed: threat ? threat.confirmed : null,
          severity: threat ? threat.severity : 'Media',
          detail: {
            evidence: dv && dv.evidence ? dv.evidence : (threat && threat.description ? threat.description : 'No details available'),
            response_code: dv && dv.response_code !== undefined ? dv.response_code : null,
            mitigation: threat && threat.mitigation ? threat.mitigation : ''
          }
        };
      });
    }

    function applyDynamicFilters(rows) {
      const f = state.filters;
      return rows.filter((r) => {
        if (!f.categories.has(r.category)) return false;
        if (!f.severities.has(r.severity)) return false;
        if (f.confirmation === 'confirmed' && r.confirmed !== true) return false;
        if (f.confirmation === 'not-confirmed' && r.confirmed === true) return false;
        return true;
      });
    }

    function renderDynamicTable(filteredRows) {
      const tbody = document.getElementById('dynamicTableBody');
      if (!filteredRows.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty">No dynamic rows match current filters.</div></td></tr>';
        return;
      }

      tbody.innerHTML = filteredRows.map((r) => {
        const statusLabel = r.vulnerable === true
          ? '<span class="status-vuln">vulnerable</span>'
          : (r.vulnerable === false ? '<span class="status-safe">seguro</span>' : '<span class="status-na">no-disponible</span>');

        const confirmLabel = r.confirmed === true
          ? '<span class="confirm-yes">yes</span>'
          : (r.confirmed === false ? '<span class="confirm-no">no</span>' : '<span class="confirm-na">no-disponible</span>');

        const detailParts = [];
        detailParts.push(`evidence: ${r.detail.evidence || 'n/a'}`);
        if (r.detail.response_code !== null) detailParts.push(`response_code: ${r.detail.response_code}`);
        if (r.detail.mitigation) detailParts.push(`mitigation: ${r.detail.mitigation}`);

        return `
          <tr>
            <td><strong>${r.attack_name}</strong><div class="details">${r.attack_class}</div></td>
            <td>${r.category}</td>
            <td>${statusLabel}</td>
            <td>${confirmLabel}</td>
            <td><details><summary>expand</summary><div class="details">${detailParts.join('<br>')}</div></details></td>
          </tr>
        `;
      }).join('');
    }

    async function loadBaseline() {
      try {
        const response = await fetch('security/baseline.json?' + Date.now());
        if (!response.ok) return [];
        const data = await response.json();
        if (Array.isArray(data)) return data;
        if (Array.isArray(data.approved_threats)) return data.approved_threats;
      } catch (_) {
      }
      return [];
    }

    async function loadPipelineStatus() {
      try {
        const response = await fetch(ACTIONS_API, { headers: { 'Accept': 'application/vnd.github+json' } });
        if (!response.ok) return null;
        const payload = await response.json();
        if (!payload || !Array.isArray(payload.workflow_runs) || !payload.workflow_runs.length) return null;
        const run = payload.workflow_runs[0];
        return {
          conclusion: run.conclusion || 'unknown',
          status: run.status || 'unknown',
          html_url: run.html_url || ACTIONS_URL,
          run_number: run.run_number || null,
          updated_at: run.updated_at || null
        };
      } catch (_) {
        return null;
      }
    }

    function renderCIPanel(filteredThreats, baseline, pipeline) {
      const baselineSet = new Set((baseline || []).map(baselineKey));
      const known = filteredThreats.filter((t) => baselineSet.has(baselineKey(t))).length;
      const newThreats = filteredThreats.filter((t) => !baselineSet.has(baselineKey(t)));
      const newHigh = newThreats.filter((t) => t.severity === 'Alta').length;

      const statusText = pipeline
        ? `${pipeline.status} / ${pipeline.conclusion}`
        : 'unknown';

      const statusClass = pipeline && pipeline.conclusion === 'success'
        ? 'pass'
        : ((pipeline && pipeline.conclusion === 'failure') || newHigh > 0 ? 'fail' : 'unknown');

      const dot = document.getElementById('ciDot');
      dot.className = `dot ${statusClass}`;
      document.getElementById('ciStatusText').textContent = `Pipeline ${statusText}`;

      const root = document.getElementById('ciPanel');
      const lastRunText = pipeline && pipeline.updated_at ? new Date(pipeline.updated_at).toLocaleString() : 'not available';
      const runLink = pipeline && pipeline.html_url ? pipeline.html_url : ACTIONS_URL;

      root.innerHTML = `
        <article class="ci-card">
          <div class="ci-k">Last Pipeline</div>
          <div class="ci-v">${statusText}</div>
          <div class="details">Updated: ${lastRunText}</div>
          <a class="link" target="_blank" rel="noopener" href="${runLink}">Open latest GitHub Actions run</a>
        </article>
        <article class="ci-card">
          <div class="ci-k">Threats New vs Baseline</div>
          <div class="ci-v">${newThreats.length} new (${newHigh} Alta)</div>
          <div class="details">Known (baseline match): ${known}</div>
        </article>
        <article class="ci-card">
          <div class="ci-k">Baseline Entries</div>
          <div class="ci-v">${baseline.length}</div>
          <div class="details">Source: security/baseline.json</div>
        </article>
        <article class="ci-card">
          <div class="ci-k">Report Context</div>
          <div class="ci-v">${filteredThreats.length} visible threats</div>
          <div class="details">Global filters are applied to all panels.</div>
        </article>
      `;
    }

    function renderAll() {
      const t0 = performance.now();
      const filteredThreats = applyGlobalFilters(state.threats);
      renderStrideCards(filteredThreats);
      renderRadar(filteredThreats);
      const dynamicRows = buildDynamicRows(state.raw, state.threats);
      const dynamicFiltered = applyDynamicFilters(dynamicRows);
      renderDynamicTable(dynamicFiltered);
      renderCIPanel(filteredThreats, state.baseline, state.pipeline);
      const elapsed = performance.now() - t0;
      const el = document.getElementById('loading');
      el.textContent = `Last render: ${elapsed.toFixed(1)}ms`;
    }

    function initDashboard(data) {
      state.raw = data;
      state.threats = (Array.isArray(data.combined_threats) ? data.combined_threats : []).map(normalizeThreat);
      const ts = data.timestamp ? new Date(data.timestamp) : new Date();
      document.getElementById('reportTime').textContent = `Report: ${ts.toLocaleString()}`;
      renderAll();
    }

    async function boot() {
      loadSavedFilters();
      setupFilters();

      const embeddedBaseline = Array.isArray(window.__EMBEDDED_BASELINE__) ? window.__EMBEDDED_BASELINE__ : null;
      const embeddedPipeline = window.__EMBEDDED_PIPELINE__ && typeof window.__EMBEDDED_PIPELINE__ === 'object'
        ? window.__EMBEDDED_PIPELINE__
        : null;

      const [baseline, pipeline] = await Promise.all([
        embeddedBaseline ? Promise.resolve(embeddedBaseline) : loadBaseline(),
        embeddedPipeline ? Promise.resolve(embeddedPipeline) : loadPipelineStatus()
      ]);
      state.baseline = baseline;
      state.pipeline = pipeline;

      const embeddedReport = window.__EMBEDDED_REPORT__;
      const reportLoader = embeddedReport
        ? Promise.resolve(embeddedReport)
        : fetch('combined-report.json?' + Date.now())
            .then((r) => {
              if (!r.ok) throw new Error(`HTTP ${r.status}`);
              return r.json();
            })
            .catch((err) => {
              if (window.location.protocol === 'file:') {
                throw new Error(
                  'El dashboard requiere un servidor HTTP. ' +
                  'Ejecuta: python serve_dashboard.py · ' +
                  'O usa dashboard-standalone.html para uso sin conexión.'
                );
              }
              throw err;
            });

      reportLoader
        .then((data) => {
          initDashboard(data);
          document.getElementById('loading').textContent = 'Dashboard ready.';
        })
        .catch((error) => {
          document.getElementById('loading').innerHTML =
            `<div class="empty">⚠️ ${error.message}</div>`;
        });
    }

    boot();
  </script>
</body>
</html>
