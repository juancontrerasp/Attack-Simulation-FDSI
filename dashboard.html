<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Dashboard – STRIDE Analysis</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #1a1a2e;
      --border: #2d2d44;
      --text: #e2e8f0;
      --muted: #888;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
      --cyan: #22d3ee;
      --accent: #818cf8;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.25rem; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; }
    .logo span { font-size: 1.5rem; }
    .header-meta { color: var(--muted); font-size: 0.82rem; }
    #ciStatus {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 14px; font-size: 0.85rem;
    }
    .ci-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ci-dot.pass { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .ci-dot.fail { background: var(--red); box-shadow: 0 0 6px var(--red); }
    .ci-dot.unknown { background: var(--muted); }

    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }
    .card .c-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .card .c-value { font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .c-value.green  { color: var(--green); }
    .c-value.yellow { color: var(--yellow); }
    .c-value.red    { color: var(--red); }
    .c-value.cyan   { color: var(--cyan); }
    .c-value.white  { color: #fff; }

    section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 24px;
    }
    section h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .two-col { display: grid; grid-template-columns: 1fr 1.6fr; gap: 24px; }
    @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

    .chart-wrap { max-width: 420px; margin: 0 auto; }

    .filters {
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 16px;
    }
    .filters input, .filters select {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 8px 12px; font-size: 0.88rem;
      outline: none;
    }
    .filters input { flex: 1; min-width: 200px; }
    .filters input:focus, .filters select:focus { border-color: var(--accent); }
    .filters label { font-size: 0.82rem; color: var(--muted); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.86rem; min-width: 600px; }
    thead th {
      text-align: left; padding: 10px 14px;
      color: var(--muted); font-weight: 600;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase; font-size: 0.74rem; letter-spacing: 0.5px;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    thead th:hover { color: var(--text); }
    thead th .sort-icon { margin-left: 4px; opacity: 0.4; }
    thead th.sorted .sort-icon { opacity: 1; color: var(--accent); }
    tbody tr { border-bottom: 1px solid #1e1e30; transition: background 0.15s; }
    tbody tr:hover { background: rgba(129,140,248,0.05); }
    tbody td { padding: 12px 14px; vertical-align: top; }
    .threat-desc { color: var(--muted); font-size: 0.82rem; margin-top: 4px; }
    .no-results { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }

    .badge {
      display: inline-block; padding: 3px 9px;
      border-radius: 4px; font-size: 0.75rem; font-weight: 600; white-space: nowrap;
    }
    .badge-Alta    { background: rgba(248,113,113,.15); color: var(--red);    border: 1px solid var(--red); }
    .badge-Media   { background: rgba(250,204, 21,.15); color: var(--yellow); border: 1px solid var(--yellow); }
    .badge-Baja    { background: rgba( 74,222,128,.15); color: var(--green);  border: 1px solid var(--green); }
    .badge-cat     { background: rgba(129,140,248,.1);  color: var(--accent); border: 1px solid var(--accent); }
    .badge-confirm { background: rgba( 34,211,238,.1);  color: var(--cyan);   border: 1px solid var(--cyan); }
    .badge-unconf  { background: rgba(136,136,136,.1);  color: var(--muted);  border: 1px solid var(--border); }

    .stride-bars { display: flex; flex-direction: column; gap: 10px; }
    .stride-label {
      display: flex; justify-content: space-between;
      font-size: 0.82rem; margin-bottom: 4px; color: var(--text);
    }
    .stride-label .cnt { color: var(--muted); }
    .progress { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s; }

    .ci-panel { display: flex; flex-direction: column; gap: 12px; }
    .ci-item {
      display: flex; align-items: flex-start; gap: 14px;
      padding: 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    }
    .ci-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
    .ci-info { flex: 1; }
    .ci-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 4px; }
    .ci-detail { font-size: 0.82rem; color: var(--muted); }
    .ci-badge { font-size: 0.78rem; padding: 2px 8px; border-radius: 3px; align-self: flex-start; }
    .ci-badge.pass { background: rgba(74,222,128,.15); color: var(--green); border: 1px solid var(--green); }
    .ci-badge.info { background: rgba(34,211,238,.1); color: var(--cyan); border: 1px solid var(--cyan); }

    .error-box { text-align: center; padding: 60px 20px; color: var(--muted); }
    .error-box .error-icon { font-size: 3rem; margin-bottom: 16px; }
    .error-box p { font-size: 0.9rem; line-height: 1.6; }
    .error-box code { background: var(--border); padding: 2px 6px; border-radius: 3px; font-size: 0.85rem; }

    #loadingMsg { text-align: center; padding: 60px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>🛡️</span> Security Dashboard</div>
  <div class="header-meta" id="reportTimestamp">Loading…</div>
  <div id="ciStatus">
    <div class="ci-dot unknown" id="ciDot"></div>
    <span id="ciStatusText">CI/CD Status</span>
  </div>
</header>

<main>
  <div id="loadingMsg">⏳ Loading combined-report.json…</div>
  <div id="content" style="display:none">
    <div class="cards" id="metricCards"></div>
    <div class="two-col">
      <section>
        <h2>📡 STRIDE Radar</h2>
        <div class="chart-wrap"><canvas id="radarChart"></canvas></div>
      </section>
      <section>
        <h2>📊 STRIDE Coverage</h2>
        <div class="stride-bars" id="strideBars"></div>
      </section>
    </div>
    <section>
      <h2>🔍 Threats</h2>
      <div class="filters">
        <input type="text" id="searchBox" placeholder="🔍 Search component, category, description…" oninput="applyFilters()">
        <label>Severity:</label>
        <select id="sevFilter" onchange="applyFilters()">
          <option value="">All</option>
          <option value="Alta">Alta</option>
          <option value="Media">Media</option>
          <option value="Baja">Baja</option>
        </select>
        <label>Category:</label>
        <select id="catFilter" onchange="applyFilters()">
          <option value="">All</option>
        </select>
        <label>Confirmed:</label>
        <select id="confFilter" onchange="applyFilters()">
          <option value="">All</option>
          <option value="yes">Confirmed</option>
          <option value="no">Not confirmed</option>
        </select>
      </div>
      <div class="table-wrap">
        <table id="threatsTable">
          <thead>
            <tr>
              <th onclick="sortBy('category')">Category <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('component')">Component <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('severity')">Severity <span class="sort-icon">↕</span></th>
              <th>Description</th>
              <th onclick="sortBy('confirmed')">Confirmed <span class="sort-icon">↕</span></th>
            </tr>
          </thead>
          <tbody id="threatsBody"></tbody>
        </table>
      </div>
      <div class="no-results" id="noResults" style="display:none">No threats match your filters.</div>
    </section>
    <section>
      <h2>⚙️ CI/CD Pipeline Status</h2>
      <div class="ci-panel" id="ciPanel"></div>
    </section>
  </div>
</main>

<script>
var allThreats = [];
var currentSort = { field: null, asc: true };

var STRIDE_CATEGORIES = [
  'Spoofing', 'Tampering', 'Repudiation',
  'InformationDisclosure', 'DenialOfService', 'ElevationOfPrivilege'
];

var CAT_ALIASES = {
  'information disclosure': 'InformationDisclosure',
  'informationdisclosure':  'InformationDisclosure',
  'denial of service':      'DenialOfService',
  'denialofservice':        'DenialOfService',
  'elevation of privilege': 'ElevationOfPrivilege',
  'elevationofprivilege':   'ElevationOfPrivilege',
};
function normCat(cat) {
  var k = (cat || '').trim().toLowerCase().replace(/\s+/g,'');
  return CAT_ALIASES[k] || cat;
}

fetch('combined-report.json?' + Date.now())
  .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(function(data) { initDashboard(data); })
  .catch(function(err) {
    document.getElementById('loadingMsg').innerHTML =
      '<div class="error-box"><div class="error-icon">⚠️</div><p>Could not load <code>combined-report.json</code><br><br>' +
      err.message + '<br><br>Use <code>dashboard-standalone.html</code> to view without a web server.</p></div>';
  });

function initDashboard(data) {
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('content').style.display = '';

  var ts = data.timestamp || new Date().toISOString();
  document.getElementById('reportTimestamp').textContent = 'Report: ' + new Date(ts).toLocaleString();

  var threats = (data.combined_threats || []).map(function(t) {
    return Object.assign({}, t, { category: normCat(t.category) });
  });
  allThreats = threats;

  renderCards(data, threats);
  renderRadar(threats);
  renderStrideBars(threats);
  renderCIPanel(data);
  populateCategoryFilter(threats);
  renderTable(threats);
}

function renderCards(data, threats) {
  var total = threats.length;
  var alta  = threats.filter(function(t){ return t.severity === 'Alta'; }).length;
  var media = threats.filter(function(t){ return t.severity === 'Media'; }).length;
  var baja  = threats.filter(function(t){ return t.severity === 'Baja'; }).length;
  var conf  = threats.filter(function(t){ return t.confirmed === true; }).length;
  var covCats = STRIDE_CATEGORIES.filter(function(c){
    return threats.some(function(t){ return t.category === c; });
  }).length;

  var cards = [
    { label: 'Total Threats',   value: total, cls: 'white' },
    { label: 'Alta',            value: alta,  cls: 'red' },
    { label: 'Media',           value: media, cls: 'yellow' },
    { label: 'Baja',            value: baja,  cls: 'green' },
    { label: 'Confirmed',       value: conf,  cls: 'cyan' },
    { label: 'STRIDE Coverage', value: Math.round(covCats/6*100)+'%', cls: 'cyan' },
  ];
  document.getElementById('metricCards').innerHTML = cards.map(function(c){
    return '<div class="card"><div class="c-label">'+c.label+'</div><div class="c-value '+c.cls+'">'+c.value+'</div></div>';
  }).join('');

  var dot = document.getElementById('ciDot');
  var ciText = document.getElementById('ciStatusText');
  if (alta === 0) {
    dot.className = 'ci-dot pass';
    ciText.textContent = 'Baseline OK';
  } else {
    dot.className = 'ci-dot fail';
    ciText.textContent = alta + ' High threat(s)';
  }
}

var radarChart = null;
function renderRadar(threats) {
  var counts = STRIDE_CATEGORIES.map(function(cat){
    return threats.filter(function(t){ return t.category === cat; }).length;
  });
  var ctx = document.getElementById('radarChart').getContext('2d');
  if (radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: STRIDE_CATEGORIES,
      datasets: [{
        label: 'Threats',
        data: counts,
        backgroundColor: 'rgba(129,140,248,0.15)',
        borderColor: '#818cf8',
        pointBackgroundColor: '#818cf8',
        borderWidth: 2,
        pointRadius: 4,
      }]
    },
    options: {
      scales: {
        r: {
          min: 0,
          ticks: { color: '#888', stepSize: 1, precision: 0 },
          grid: { color: '#2d2d44' },
          pointLabels: { color: '#ccc', font: { size: 11 } },
          angleLines: { color: '#2d2d44' }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

function renderStrideBars(threats) {
  var counts = STRIDE_CATEGORIES.map(function(c){
    return threats.filter(function(t){ return t.category === c; }).length;
  });
  var maxCount = Math.max.apply(null, counts.concat([1]));
  document.getElementById('strideBars').innerHTML = STRIDE_CATEGORIES.map(function(cat, i){
    var count = counts[i];
    var pct = Math.round(count / maxCount * 100);
    var color = count === 0 ? '#2d2d44' : count >= 3 ? '#f87171' : count >= 2 ? '#facc15' : '#4ade80';
    return '<div class="stride-row">' +
      '<div class="stride-label"><span>'+cat+'</span><span class="cnt">'+count+' threat'+(count!==1?'s':'')+'</span></div>' +
      '<div class="progress"><div class="progress-fill" style="width:'+pct+'%;background:'+color+'"></div></div>' +
      '</div>';
  }).join('');
}

function renderCIPanel(data) {
  var sum = data.executive_summary || {};
  var ts  = data.timestamp || new Date().toISOString();
  var items = [
    { icon:'🔄', title:'Last Analysis Run',         detail:'STRIDE + dynamic validation via diff-analyzer',                     badge:'info', badgeText: new Date(ts).toLocaleString() },
    { icon:'📊', title:'Threat Detection',           detail:(sum.total_detected||0)+' detected · '+(sum.total_confirmed||0)+' confirmed dynamically', badge:'pass', badgeText: sum.system_status||'N/A' },
    { icon:'🔒', title:'Baseline Validation',        detail:'Automated check against security/baseline.json on every push',     badge:'pass', badgeText:'Configured' },
    { icon:'📦', title:'Artifact: threats-output.json', detail:'Published on every CI run (retention: 30 days)',                badge:'info', badgeText:'Automated' },
  ];
  document.getElementById('ciPanel').innerHTML = items.map(function(i){
    return '<div class="ci-item"><div class="ci-icon">'+i.icon+'</div><div class="ci-info"><div class="ci-title">'+i.title+'</div><div class="ci-detail">'+i.detail+'</div></div><span class="ci-badge '+i.badge+'">'+i.badgeText+'</span></div>';
  }).join('');
}

function populateCategoryFilter(threats) {
  var cats = [];
  threats.forEach(function(t){ if (cats.indexOf(t.category) === -1) cats.push(t.category); });
  cats.sort();
  var sel = document.getElementById('catFilter');
  cats.forEach(function(c){
    var o = document.createElement('option');
    o.value = c; o.textContent = c;
    sel.appendChild(o);
  });
}

function renderTable(threats) {
  var tbody = document.getElementById('threatsBody');
  var noRes = document.getElementById('noResults');
  if (threats.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = '';
    return;
  }
  noRes.style.display = 'none';
  tbody.innerHTML = threats.map(function(t){
    var confBadge = t.confirmed === true
      ? '<span class="badge badge-confirm">✓ Confirmed</span>'
      : '<span class="badge badge-unconf">Unconfirmed</span>';
    return '<tr>' +
      '<td><span class="badge badge-cat">'+t.category+'</span></td>' +
      '<td><strong>'+(t.component||'—')+'</strong></td>' +
      '<td><span class="badge badge-'+(t.severity||'')+'">'+t.severity+'</span></td>' +
      '<td><span>'+(t.description||'—')+'</span>'+(t.mitigation?'<div class="threat-desc">💡 '+t.mitigation+'</div>':'')+'</td>' +
      '<td>'+confBadge+'</td></tr>';
  }).join('');
}

function applyFilters() {
  var q    = document.getElementById('searchBox').value.toLowerCase();
  var sev  = document.getElementById('sevFilter').value;
  var cat  = document.getElementById('catFilter').value;
  var conf = document.getElementById('confFilter').value;

  var filtered = allThreats.filter(function(t){
    if (sev && t.severity !== sev) return false;
    if (cat && t.category !== cat) return false;
    if (conf === 'yes' && t.confirmed !== true) return false;
    if (conf === 'no'  && t.confirmed === true) return false;
    if (q) {
      var haystack = [t.category, t.component, t.description, t.mitigation].join(' ').toLowerCase();
      if (haystack.indexOf(q) === -1) return false;
    }
    return true;
  });

  if (currentSort.field) filtered = sortThreats(filtered, currentSort.field, currentSort.asc);
  renderTable(filtered);
}

var SEV_ORDER = { Alta: 0, Media: 1, Baja: 2 };
function sortThreats(threats, field, asc) {
  return threats.slice().sort(function(a, b){
    var va = a[field], vb = b[field];
    if (field === 'severity')   { va = SEV_ORDER[va]||9; vb = SEV_ORDER[vb]||9; }
    else if (field === 'confirmed') { va = va===true?0:1; vb = vb===true?0:1; }
    else { va = (va||'').toLowerCase(); vb = (vb||'').toLowerCase(); }
    if (va < vb) return asc ? -1 : 1;
    if (va > vb) return asc ?  1 : -1;
    return 0;
  });
}

function sortBy(field) {
  if (currentSort.field === field) currentSort.asc = !currentSort.asc;
  else { currentSort.field = field; currentSort.asc = true; }
  document.querySelectorAll('thead th').forEach(function(th){ th.classList.remove('sorted'); });
  document.querySelectorAll('thead th').forEach(function(th){
    if (th.getAttribute('onclick') === "sortBy('"+field+"')") {
      th.classList.add('sorted');
      th.querySelector('.sort-icon').textContent = currentSort.asc ? '↑' : '↓';
    }
  });
  applyFilters();
}
</script>
</body>
</html>
